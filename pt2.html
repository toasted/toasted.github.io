<!DOCTYPE html>
<html lang="en">
<head>
    <title>PT Routine Timer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        :root { 
            --hold: #2ecc71; --rest: #e67e22; --setrest: #3498db; 
            --prep: #f1c40f; --transition: #9b59b6;
            --bg: #f0f2f5; --card: #ffffff; --text: #333333;
            --subtext: #888888; --border: #dddddd;
        }

        body.dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --subtext: #aaaaaa; --border: #333333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; background-color: var(--bg); transition: background-color 0.3s; }
        body { 
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
        }

        /* Settings Screen Styles */
        #screen-settings {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 15px 15px 160px; max-width: 600px; margin: 0 auto;
        }
        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; }
        .settings-card {
            background: var(--card); padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%;
        }
        .full-width { grid-column: span 2; }
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: var(--subtext); margin-bottom: 4px; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--card); color: var(--text); width: 100%; }
        .section-header { width: 100%; margin: 25px 0 10px; font-weight: bold; color: var(--subtext); display: flex; justify-content: space-between; font-size: 0.8rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .item-card { background: var(--card); margin-bottom: 8px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-action { border: none; background: none; padding: 8px; font-size: 1.1rem; cursor: pointer; color: var(--text); opacity: 0.6; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, var(--bg) 30%); display: flex; justify-content: center; z-index: 100; }
        .btn-main { border-radius: 50px; border: none; font-weight: bold; font-size: 1rem; padding: 18px; cursor: pointer; width: 100%; }
        #btn-start { background: var(--hold); color: white; flex: 2; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }

        /* Workout Screen (The Dynamic Colors) */
        #screen-workout { display: none; position: fixed; inset: 0; flex-direction: column; color: white; text-align: center; z-index: 200; transition: background-color 0.4s; }
        
        /* State Background Classes */
        .mode-prep { background-color: var(--prep) !important; color: #222 !important; }
        .mode-hold { background-color: var(--hold) !important; color: white !important; }
        .mode-rest { background-color: var(--rest) !important; color: white !important; }
        .mode-setrest { background-color: var(--setrest) !important; color: white !important; }
        .mode-transition { background-color: var(--transition) !important; color: white !important; }

        /* Readability fix: When in Prep mode (yellow), make timer/text dark */
        .mode-prep #timer-display, .mode-prep #status-text, .mode-prep .nav-btn, .mode-prep .stat-count { color: #222 !important; }
        .mode-prep .ring-bg { stroke: rgba(0,0,0,0.1); }
        .mode-prep .ring-progress { stroke: #222; }

        #timer-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        #timer-display { font-size: 32vmin; font-weight: 900; z-index: 10; font-variant-numeric: tabular-nums; }
        
        .ring-svg { position: absolute; width: 85vmin; height: 85vmin; transform: rotate(-90deg); }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 5; }
        .ring-progress { fill: none; stroke: white; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.2s linear; }

        .nav-btn { position: absolute; top: 0; bottom: 0; width: 25%; background: none; border: none; color: white; font-size: 3rem; opacity: 0.15; cursor: pointer; z-index: 20; }
        .btn-prev { left: 0; } .btn-next { right: 0; }

        .stats-footer { display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.15); padding: 15px 0; }
        .stat-label { font-size: 0.7rem; opacity: 0.8; font-weight: bold; }
        .stat-count { font-size: 1.8rem; font-weight: 900; }

        /* Mobile Landscape Optimization */
        @media (max-width: 950px) and (orientation: landscape) and (pointer: coarse) {
            #workout-header, .stats-footer, #notes-display { display: none; }
            #timer-display { font-size: 50vh; }
            .ring-svg { width: 95vh; height: 95vh; }
            .workout-controls { flex-direction: row !important; position: fixed; bottom: 10px; right: 10px; width: auto !important; }
        }
    </style>
</head>
<body>

    <div id="screen-settings">
        <div class="header-row">
            <h1 style="margin:0;">Physio Routiner</h1>
            <button id="btn-theme" onclick="toggleTheme()" style="background:none; border:1px solid var(--subtext); color:var(--text); padding:5px 12px; border-radius:15px; cursor:pointer;">🌙 Dark</button>
        </div>
        
        <div class="settings-card">
            <div class="full-width"><label>Exercise Name</label><input type="text" id="inName" placeholder="e.g. Plank"></div>
            <div><label>Hold (Sec)</label><input type="number" id="inHold" value="10"></div>
            <div><label>Rest (Sec)</label><input type="number" id="inRest" value="5"></div>
            <div><label>Reps</label><input type="number" id="inReps" value="10"></div>
            <div><label>Sets</label><input type="number" id="inSets" value="1"></div>
            <div class="full-width"><label>Rest Between Sets</label><input type="number" id="inSetRest" value="30"></div>
            <div class="full-width"><label>Notes / Tip</label><input type="text" id="inNotes" placeholder="Keep back flat..."></div>
        </div>

        <div class="section-header"><span>MY PRESETS</span></div>
        <div id="presets-list" style="width:100%"></div>

        <div class="section-header"><span>CURRENT ROUTINE</span> <span id="routine-count">0</span></div>
        <div id="routine-list" style="width:100%"></div>
        
        <div style="width:100%; text-align:right; margin: 20px 0;">
            <label>Transition Sec: </label>
            <input type="number" id="inTrans" value="10" style="width:70px; display:inline; padding:5px;">
        </div>

        <div class="section-header"><span>HISTORY (Last 5)</span></div>
        <div id="history-list" style="width:100%; opacity: 0.7;"></div>

        <div class="bottom-bar">
            <div class="btn-group">
                <button id="btn-save" class="btn-main" onclick="savePreset()" style="background:var(--card); color:var(--text); flex:1; border:1px solid var(--border); margin-right:10px;">SAVE PRESET</button>
                <button id="btn-start" class="btn-main" onclick="startWorkout()">START</button>
            </div>
        </div>
    </div>

    <div id="screen-workout">
        <div id="workout-header" style="padding: 4vh 20px 0;">
            <div id="ex-name-display" style="font-size: 1.1rem; font-weight: bold; background: rgba(0,0,0,0.1); padding: 5px 15px; border-radius: 20px; display:inline-block;">EXERCISE</div>
            <div id="status-text" style="font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; margin-top: 10px;">PREP</div>
        </div>

        <div id="timer-container">
            <button class="nav-btn btn-prev" onclick="navStep(-1)">❮</button>
            <svg class="ring-svg" viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                <circle id="progress-ring" class="ring-progress" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="0"></circle>
            </svg>
            <div id="timer-display">0</div>
            <button class="nav-btn btn-next" onclick="navStep(1)">❯</button>
        </div>

        <div id="notes-display" style="font-size: 1.2rem; min-height: 1.5em; margin-bottom: 10px; padding: 0 20px; font-style: italic;"></div>

        <div class="stats-footer">
            <div class="stat-box"><span class="stat-label">EXERCISE</span><br><span id="outEx" class="stat-count">1/1</span></div>
            <div class="stat-box"><span class="stat-label">SET</span><br><span id="outSet" class="stat-count">1</span></div>
            <div class="stat-box"><span class="stat-label">REP</span><br><span id="outRep" class="stat-count">1</span></div>
        </div>

        <div class="workout-controls" style="padding: 20px; width: 100%; max-width: 400px; align-self: center; display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-pause" onclick="togglePause()" style="padding:15px; border-radius:50px; border:2px solid currentColor; background:none; color:inherit; font-weight:bold; cursor:pointer;">PAUSE</button>
            <button onclick="resetAll()" style="background: rgba(0,0,0,0.1); color: inherit; border:none; padding:10px; border-radius:50px; font-size:0.8rem; cursor:pointer;">QUIT</button>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let timer = null, isPaused = false, wakeLock = null;
        let mode = 'PREP', timeLeft, totalTime, currentRep, currentSet, currentExIdx;
        let presets = [], routine = [], history = [];
        let lastBeepVal = -1;

        window.onload = () => {
            presets = JSON.parse(localStorage.getItem('pt-presets') || '[]');
            routine = JSON.parse(localStorage.getItem('pt-routine') || '[]');
            history = JSON.parse(localStorage.getItem('pt-history') || '[]');
            renderPresets(); renderRoutine(); renderHistory();
            if (localStorage.getItem('dark-mode') === 'true') toggleTheme(true);
        };

        function toggleTheme(init = false) {
            const isDark = init ? true : document.body.classList.toggle('dark-mode');
            if (init) document.body.classList.add('dark-mode');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('btn-theme').innerText = isDark ? "☀️ Light" : "🌙 Dark";
        }

        function beep(freq = 440, duration = 150) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq; oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration/1000);
                oscillator.stop(audioCtx.currentTime + duration/1000);
            } catch(e) {}
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        function savePreset() {
            const ex = {
                name: document.getElementById('inName').value || "Ex " + (presets.length + 1),
                hold: Math.max(1, parseInt(document.getElementById('inHold').value)),
                rest: Math.max(0, parseInt(document.getElementById('inRest').value)),
                reps: Math.max(1, parseInt(document.getElementById('inReps').value)),
                sets: Math.max(1, parseInt(document.getElementById('inSets').value)),
                setRest: Math.max(0, parseInt(document.getElementById('inSetRest').value)),
                notes: document.getElementById('inNotes').value || ""
            };
            presets.push(ex); localStorage.setItem('pt-presets', JSON.stringify(presets));
            renderPresets();
        }

        function renderPresets() {
            const container = document.getElementById('presets-list');
            container.innerHTML = presets.map((ex, i) => `
                <div class="item-card">
                    <div class="item-info" onclick="loadToInputs(${i})">
                        <span class="item-name">${ex.name}</span>
                        <span class="item-meta">${ex.sets}x${ex.reps} | H:${ex.hold}s R:${ex.rest}s</span>
                    </div>
                    <button class="btn-action" style="color:var(--hold); opacity:1;" onclick="addToRoutine(${i})">+</button>
                    <button class="btn-action" onclick="deletePreset(${i})">✕</button>
                </div>
            `).join('') || '<p style="color:#aaa; font-size:0.8rem">No presets yet.</p>';
        }

        function deletePreset(index) { presets.splice(index, 1); localStorage.setItem('pt-presets', JSON.stringify(presets)); renderPresets(); }
        function loadToInputs(i) {
            const ex = presets[i];
            ['Name','Hold','Rest','Reps','Sets','SetRest','Notes'].forEach(f => document.getElementById('in'+f).value = ex[f.toLowerCase()]);
        }
        function addToRoutine(i) { routine.push({...presets[i]}); renderRoutine(); }
        function moveRoutine(i, dir) {
            if (i + dir < 0 || i + dir >= routine.length) return;
            [routine[i], routine[i+dir]] = [routine[i+dir], routine[i]];
            renderRoutine();
        }

        function renderRoutine() {
            localStorage.setItem('pt-routine', JSON.stringify(routine));
            document.getElementById('routine-count').innerText = routine.length;
            const container = document.getElementById('routine-list');
            container.innerHTML = routine.map((ex, i) => `
                <div class="item-card" style="border-left: 4px solid var(--transition)">
                    <span class="item-name">${ex.name}</span>
                    <div style="display:flex;">
                        <button class="btn-action" onclick="moveRoutine(${i}, -1)">▲</button>
                        <button class="btn-action" onclick="moveRoutine(${i}, 1)">▼</button>
                        <button class="btn-action" style="color:#ff4757; opacity:1;" onclick="routine.splice(${i},1);renderRoutine();">✕</button>
                    </div>
                </div>
            `).join('') || '<p style="color:#aaa; font-size:0.8rem">Tap + on a preset.</p>';
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = history.slice(-5).reverse().map(h => `
                <div class="history-item"><span>${h.date}</span> <b>${h.name}</b></div>
            `).join('');
        }

        async function startWorkout() {
            if (routine.length === 0) {
                addToRoutine(); // Fallback to current inputs if list is empty
                if (routine.length === 0) return;
            }
            currentExIdx = 0; currentRep = 1; currentSet = 1;
            mode = 'PREP'; timeLeft = 5; totalTime = 5; lastBeepVal = -1;
            
            document.getElementById('screen-settings').style.display = 'none';
            document.getElementById('screen-workout').style.display = 'flex';
            if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
            
            updateUI();
            speak("Get ready for " + routine[currentExIdx].name);
            
            let expected = Date.now() + 1000;
            timer = setTimeout(function tick() {
                if (!isPaused) {
                    if (timeLeft <= 3 && timeLeft > 0 && timeLeft !== lastBeepVal) {
                        beep(600, 50); lastBeepVal = timeLeft;
                    }
                    timeLeft--;
                    if (timeLeft < 0) {
                        beep(880, 250);
                        if (navigator.vibrate) navigator.vibrate(300);
                        transition();
                    }
                    if (timer) updateUI();
                }
                if (timer) {
                    let dt = Date.now() - expected;
                    expected += 1000;
                    timer = setTimeout(tick, Math.max(0, 1000 - dt));
                }
            }, 1000);
        }

        function navStep(dir) {
            if (dir === 1) { timeLeft = 0; transition(); }
            else { timeLeft = totalTime; }
            updateUI();
        }

        function transition() {
            const ex = routine[currentExIdx];
            const transTime = parseInt(document.getElementById('inTrans').value) || 10;

            if (mode !== 'HOLD') {
                mode = 'HOLD'; timeLeft = ex.hold; totalTime = ex.hold; speak("Hold");
            } else {
                if (currentRep < ex.reps) {
                    currentRep++; mode = 'REST'; timeLeft = ex.rest; totalTime = ex.rest; speak("Rest");
                } else if (currentSet < ex.sets) {
                    currentSet++; currentRep = 1; mode = 'SETREST'; timeLeft = ex.setRest; totalTime = ex.setRest; speak("Set rest");
                } else if (currentExIdx < routine.length - 1) {
                    currentExIdx++; currentRep = 1; currentSet = 1;
                    mode = 'TRANSITION'; timeLeft = transTime; totalTime = transTime;
                    speak("Next: " + routine[currentExIdx].name);
                } else {
                    finish();
                    return;
                }
            }
            lastBeepVal = -1;
            if (timeLeft <= 0) transition(); // Skip zero-sec phases
        }

        function finish() {
            // CRITICAL FIX: Clear timer FIRST to prevent the alert loop
            clearTimeout(timer); timer = null;
            
            const workoutName = routine.length > 1 ? "Full Routine" : routine[0].name;
            history.push({ date: new Date().toLocaleDateString(), name: workoutName });
            localStorage.setItem('pt-history', JSON.stringify(history));
            renderHistory();
            
            speak("Routine complete. Well done.");
            setTimeout(() => {
                alert("Workout complete!");
                resetAll();
            }, 100);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? "RESUME" : "PAUSE";
        }

        function resetAll() {
            clearTimeout(timer); timer = null; isPaused = false;
            if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; }
            document.getElementById('screen-settings').style.display = 'flex';
            document.getElementById('screen-workout').style.display = 'none';
        }

        function updateUI() {
            const ex = routine[currentExIdx];
            const screen = document.getElementById('screen-workout');
            screen.className = "mode-" + mode.toLowerCase();
            
            document.getElementById('status-text').innerText = (mode === 'SETREST' ? 'SET REST' : mode);
            document.getElementById('ex-name-display').innerText = (mode === 'TRANSITION' ? 'UP NEXT' : ex.name);
            document.getElementById('timer-display').innerText = Math.max(0, timeLeft);
            document.getElementById('notes-display').innerText = (mode === 'HOLD' ? ex.notes : "");
            document.getElementById('outEx').innerText = (currentExIdx + 1) + "/" + routine.length;
            document.getElementById('outSet').innerText = currentSet;
            document.getElementById('outRep').innerText = currentRep;

            const ring = document.getElementById('progress-ring');
            const offset = totalTime > 0 ? (283 - (timeLeft / totalTime) * 283) : 0;
            ring.style.strokeDashoffset = offset;
        }
    </script>
</body>
</html>
