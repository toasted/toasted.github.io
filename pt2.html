<!DOCTYPE html>
<html>
<head>
    <title>PT Pro Timer - Routine Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root { 
            --hold: #2ecc71; --rest: #e67e22; --setrest: #3498db; 
            --prep: #f1c40f; --bg: #f0f2f5; --transition: #9b59b6;
        }

        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: #333;
        }

        #screen-settings {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 20px;
            overflow-y: auto;
        }

        .settings-card {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 500px; width: 100%;
            margin-bottom: 20px;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .settings-card { grid-template-columns: repeat(3, 1fr); }
        }

        .settings-card div { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        input { 
            padding: 10px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 1rem; width: 100%; background: #fff;
        }

        /* Routine/Playlist Styles */
        .playlist-container {
            width: 100%; max-width: 500px;
            background: #fff; border-radius: 20px; padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .playlist-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #eee;
        }
        .playlist-item:last-child { border-bottom: none; }
        .playlist-info { display: flex; flex-direction: column; }
        .playlist-name { font-weight: bold; }
        .playlist-meta { font-size: 0.7rem; color: #777; }
        .btn-remove { background: #ff4757; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; }

        #screen-workout {
            display: none; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            flex-direction: column; color: white; text-align: center;
            z-index: 100;
        }

        #workout-header { padding-top: 2vh; }
        #ex-name-display { font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.2); display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 5px; }
        #status-text { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        
        #timer-display { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 30vh; font-weight: 900; line-height: 1;
        }

        .stats-footer {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            background: rgba(0,0,0,0.2); padding: 10px 0;
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.8rem; opacity: 0.8; font-weight: bold; }
        .stat-count { font-size: 2.5rem; font-weight: 900; line-height: 1; }

        .btn-container { padding: 15px; width: 100%; max-width: 400px; }
        button { 
            width: 100%; border: none; border-radius: 50px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; padding: 15px;
        }
        #btn-start { background: #2ecc71; color: white; margin-top: 15px; }
        #btn-add { background: #3498db; color: white; margin-top: 10px; font-size: 0.9rem; padding: 10px; }
        #btn-pause { background: rgba(255,255,255,0.2); color: white; margin-bottom: 8px; border: 1px solid white; padding: 10px; }
        #btn-reset { background: #ff4757; color: white; font-size: 0.8rem; padding: 8px; opacity: 0.8; }

        .mode-prep { background-color: var(--prep) !important; color: #222 !important; }
        .mode-hold { background-color: var(--hold) !important; }
        .mode-rest { background-color: var(--rest) !important; }
        .mode-setrest { background-color: var(--setrest) !important; }
        .mode-transition { background-color: var(--transition) !important; }
    </style>
</head>
<body>

    <!-- SCREEN 1: SETTINGS -->
    <div id="screen-settings">
        <h1>PT Routine Pro</h1>
        
        <div class="settings-card">
            <div class="full-width"><label>Exercise Name</label><input type="text" id="inName" placeholder="e.g. Hamstring Stretch"></div>
            <div><label>Hold (Sec)</label><input type="number" id="inHold" value="10"></div>
            <div><label>Rest (Sec)</label><input type="number" id="inRest" value="3"></div>
            <div><label>Reps/Set</label><input type="number" id="inReps" value="10"></div>
            <div><label>Sets</label><input type="number" id="inSets" value="1"></div>
            <div><label>Set Rest</label><input type="number" id="inSetRest" value="0"></div>
            <div class="full-width">
                <button id="btn-add" onclick="addToRoutine()">+ ADD TO ROUTINE</button>
            </div>
        </div>

        <div class="playlist-container">
            <label>Your Routine</label>
            <div id="playlist-list">
                <!-- Items added here -->
            </div>
            <div style="margin-top:10px;">
                <label>Transition between exercises (sec)</label>
                <input type="number" id="inTransition" value="10" style="width: 60px; padding: 5px;">
            </div>
        </div>

        <div class="btn-container">
            <button id="btn-start" onclick="startWorkout()">START ROUTINE</button>
        </div>
    </div>

    <!-- SCREEN 2: WORKOUT -->
    <div id="screen-workout">
        <div id="workout-header">
            <div id="ex-name-display">NAME</div><br>
            <div id="status-text">GET READY</div>
        </div>

        <div id="timer-display">0</div>

        <div class="stats-footer">
            <div class="stat-box">
                <span class="stat-label">EXERCISE</span>
                <span class="stat-count" id="outEx">1/1</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">SET</span>
                <span class="stat-count" id="outSet">1</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">REP</span>
                <span class="stat-count" id="outRep">1</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; padding: 10px;">
            <div class="btn-container">
                <button id="btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="btn-reset" onclick="resetAll()">QUIT</button>
            </div>
        </div>
    </div>

    <script>
        let timer = null, isPaused = false, wakeLock = null;
        let mode = 'PREP', timeLeft, currentRep, currentSet, currentExIdx;
        let routine = [];

        window.onload = () => {
            const saved = localStorage.getItem('pt-routine');
            if (saved) {
                routine = JSON.parse(saved);
                renderRoutine();
            }
            const trans = localStorage.getItem('pt-transition');
            if (trans) document.getElementById('inTransition').value = trans;
        };

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
            if (navigator.vibrate) navigator.vibrate(200);
        }

        function addToRoutine() {
            const ex = {
                name: document.getElementById('inName').value || "Exercise " + (routine.length + 1),
                hold: parseInt(document.getElementById('inHold').value),
                rest: parseInt(document.getElementById('inRest').value),
                reps: parseInt(document.getElementById('inReps').value),
                sets: parseInt(document.getElementById('inSets').value),
                setRest: parseInt(document.getElementById('inSetRest').value)
            };
            routine.push(ex);
            saveAndRender();
            document.getElementById('inName').value = ""; // Clear for next
        }

        function removeFromRoutine(index) {
            routine.splice(index, 1);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('pt-routine', JSON.stringify(routine));
            localStorage.setItem('pt-transition', document.getElementById('inTransition').value);
            renderRoutine();
        }

        function renderRoutine() {
            const list = document.getElementById('playlist-list');
            list.innerHTML = routine.length === 0 ? "<p style='font-size:0.8rem; color:#aaa;'>Playlist empty. Add exercises above.</p>" : "";
            routine.forEach((ex, i) => {
                list.innerHTML += `
                    <div class="playlist-item">
                        <div class="playlist-info">
                            <span class="playlist-name">${ex.name}</span>
                            <span class="playlist-meta">${ex.sets}x${ex.reps} | H:${ex.hold}s R:${ex.rest}s</span>
                        </div>
                        <button class="btn-remove" onclick="removeFromRoutine(${i})">✕</button>
                    </div>
                `;
            });
        }

        async function startWorkout() {
            if (routine.length === 0) {
                alert("Add at least one exercise to your routine first!");
                return;
            }

            currentExIdx = 0;
            loadExercise(currentExIdx);

            document.getElementById('screen-settings').style.display = 'none';
            document.getElementById('screen-workout').style.display = 'flex';
            
            if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
            
            updateUI();
            speak("Starting routine. First exercise: " + routine[currentExIdx].name + ". Get ready.");
            timer = setInterval(tick, 1000);
        }

        function loadExercise(index) {
            const ex = routine[index];
            currentRep = 1; 
            currentSet = 1;
            mode = 'PREP'; 
            timeLeft = 5; // Fixed 5s prep for each new exercise
            document.getElementById('ex-name-display').innerText = ex.name;
        }

        function tick() {
            if (isPaused) return;
            timeLeft--;
            if (timeLeft < 0) transition();
            updateUI();
        }

        function transition() {
            const ex = routine[currentExIdx];
            const transTime = parseInt(document.getElementById('inTransition').value);

            if (mode === 'PREP' || mode === 'REST' || mode === 'SETREST' || mode === 'TRANSITION') {
                mode = 'HOLD'; timeLeft = ex.hold; speak("Hold");
            } else {
                // Was in HOLD, check what's next
                if (currentRep < ex.reps) {
                    currentRep++; mode = 'REST'; timeLeft = ex.rest; speak("Rest");
                } else if (currentSet < ex.sets) {
                    currentSet++; currentRep = 1; mode = 'SETREST'; timeLeft = ex.setRest; speak("Set rest");
                } else {
                    // Exercise Finished
                    if (currentExIdx < routine.length - 1) {
                        currentExIdx++;
                        mode = 'TRANSITION';
                        timeLeft = transTime;
                        speak("Exercise complete. Next up: " + routine[currentExIdx].name);
                    } else {
                        finish();
                    }
                }
            }
        }

        function finish() {
            clearInterval(timer);
            speak("Routine complete. Great job!");
            alert("Routine complete!");
            resetAll();
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? "RESUME" : "PAUSE";
            document.getElementById('btn-pause').style.background = isPaused ? "#2ecc71" : "rgba(255,255,255,0.2)";
        }

        function resetAll() {
            clearInterval(timer); timer = null; isPaused = false;
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            document.getElementById('screen-settings').style.display = 'flex';
            document.getElementById('screen-workout').style.display = 'none';
            document.getElementById('btn-pause').innerText = "PAUSE";
            document.getElementById('btn-pause').style.background = "rgba(255,255,255,0.2)";
        }

        function updateUI() {
            const screen = document.getElementById('screen-workout');
            const statusText = document.getElementById('status-text');
            
            screen.className = "mode-" + mode.toLowerCase();
            statusText.innerText = (mode === 'SETREST' ? 'SET REST' : mode);
            
            if (mode === 'TRANSITION') {
                statusText.innerText = "NEXT: " + routine[currentExIdx].name;
                document.getElementById('ex-name-display').innerText = "TRANSITION";
            } else {
                document.getElementById('ex-name-display').innerText = routine[currentExIdx].name;
            }

            document.getElementById('timer-display').innerText = timeLeft;
            document.getElementById('outEx').innerText = (currentExIdx + 1) + "/" + routine.length;
            document.getElementById('outSet').innerText = currentSet;
            document.getElementById('outRep').innerText = currentRep;
        }
    </script>
</body>
</html>
