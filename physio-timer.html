<!DOCTYPE html>
<html>
<head>
    <title>PT Pro Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root { 
            --hold: #2ecc71; --rest: #e67e22; --setrest: #3498db; 
            --prep: #f1c40f; 
            /* Light Mode Defaults */
            --bg: #f0f2f5; 
            --card: #ffffff;
            --text: #333333;
            --subtext: #888888;
            --border: #dddddd;
        }

        /* Dark Mode Overrides */
        body.dark-mode {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --subtext: #aaaaaa;
            --border: #333333;
        }

        * { box-sizing: border-box; }
        
        /* Fix for background "white chunk" on PCs */
        html { height: 100%; background-color: var(--bg); }

        body { 
            margin: 0; padding: 0; width: 100%; min-height: 100%;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Header Layout */
        .header-container {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: 500px; margin-bottom: 10px;
        }

        #btn-theme {
            background: none; border: 1px solid var(--subtext); color: var(--text);
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.8rem;
        }

        /* SCREEN 1: SETTINGS */
        #screen-settings {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; padding: 20px;
            overflow-y: auto;
        }

        .settings-card {
            background: var(--card); padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: grid; 
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 500px; width: 100%;
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .settings-card { grid-template-columns: repeat(3, 1fr); }
            h1 { margin: 5px; font-size: 1.2rem; }
            .full-width { grid-column: span 1 !important; }
        }

        .settings-card div { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        
        label { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; color: var(--subtext); margin-bottom: 4px; }
        input { 
            padding: 10px; border: 1px solid var(--border); border-radius: 8px; 
            font-size: 16px; /* 16px prevents auto-zoom on mobile */
            width: 100%; background: var(--card); color: var(--text);
        }

        /* SCREEN 2: WORKOUT */
        #screen-workout {
            display: none; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            flex-direction: column; color: white; text-align: center;
            z-index: 100;
        }

        #workout-header { padding-top: 2vh; }
        #status-text { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        
        #timer-display { 
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 35vh; font-weight: 900; line-height: 1;
        }

        @media (orientation: landscape) {
            #timer-display { font-size: 40vh; }
            .stats-footer { padding: 5px 0 !important; }
            .stat-count { font-size: 2.5rem !important; }
        }

        .stats-footer {
            display: grid; grid-template-columns: 1fr 1fr;
            background: rgba(0,0,0,0.2); padding: 10px 0;
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.8rem; opacity: 0.8; font-weight: bold; }
        .stat-count { font-size: 3.5rem; font-weight: 900; line-height: 1; }

        .btn-container { padding: 15px; width: 100%; max-width: 400px; }
        button { 
            width: 100%; border: none; border-radius: 50px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; padding: 15px;
        }
        #btn-start { background: #2ecc71; color: white; margin-top: 15px; }
        #btn-pause { background: rgba(255,255,255,0.2); color: white; margin-bottom: 8px; border: 1px solid white; padding: 10px; }
        #btn-reset { background: #ff4757; color: white; font-size: 0.8rem; padding: 8px; opacity: 0.8; }

        /* Color States */
        .mode-prep { background-color: var(--prep) !important; color: #222 !important; }
        .mode-hold { background-color: var(--hold) !important; color: white !important; }
        .mode-rest { background-color: var(--rest) !important; color: white !important; }
        .mode-setrest { background-color: var(--setrest) !important; color: white !important; }
    </style>
</head>
<body>

    <!-- SCREEN 1: SETTINGS -->
    <div id="screen-settings">
        <div class="header-container">
            <h1 style="margin:0;">PT Timer</h1>
            <button id="btn-theme" onclick="toggleTheme()">🌙 Dark</button>
        </div>
        
        <div class="settings-card">
            <div class="full-width"><label>Prep Delay</label><input type="number" id="inPrep" value="5"></div>
            <div><label>Hold (Sec)</label><input type="number" id="inHold" value="10"></div>
            <div><label>Rest (Sec)</label><input type="number" id="inRest" value="3"></div>
            <div><label>Reps/Set</label><input type="number" id="inReps" value="10"></div>
            <div><label>Sets</label><input type="number" id="inSets" value="3"></div>
            <div class="full-width"><label>Rest Between Sets</label><input type="number" id="inSetRest" value="30"></div>
        </div>
        <div class="btn-container">
            <button id="btn-start" onclick="startWorkout()">START WORKOUT</button>
        </div>
    </div>

    <!-- SCREEN 2: WORKOUT -->
    <div id="screen-workout">
        <div id="workout-header">
            <div id="status-text">GET READY</div>
        </div>

        <div id="timer-display">0</div>

        <div class="stats-footer">
            <div class="stat-box">
                <span class="stat-label">SET</span>
                <span class="stat-count" id="outSet">1</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">REP</span>
                <span class="stat-count" id="outRep">1</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; padding: 10px;">
            <div class="btn-container">
                <button id="btn-pause" onclick="togglePause()">PAUSE</button>
                <button id="btn-reset" onclick="resetAll()">QUIT</button>
            </div>
        </div>
    </div>

    <script>
        let timer = null, isPaused = false, wakeLock = null;
        let mode = 'PREP', timeLeft, currentRep, currentSet;
        const inputIds = ['inPrep', 'inHold', 'inRest', 'inReps', 'inSets', 'inSetRest'];

        window.onload = () => {
            // Load saved input values
            inputIds.forEach(id => {
                const val = localStorage.getItem(id);
                if (val) document.getElementById(id).value = val;
            });

            // Load theme preference
            if (localStorage.getItem('dark-mode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('btn-theme').innerText = "☀️ Light";
            }
        };

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark-mode', isDark);
            document.getElementById('btn-theme').innerText = isDark ? "☀️ Light" : "🌙 Dark";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
            if (navigator.vibrate) navigator.vibrate(200);
        }

        async function startWorkout() {
            inputIds.forEach(id => localStorage.setItem(id, document.getElementById(id).value));

            currentRep = 1; currentSet = 1;
            let prep = parseInt(document.getElementById('inPrep').value);
            
            if (prep > 0) {
                mode = 'PREP'; timeLeft = prep;
            } else {
                mode = 'HOLD'; timeLeft = parseInt(document.getElementById('inHold').value);
            }

            document.getElementById('screen-settings').style.display = 'none';
            document.getElementById('screen-workout').style.display = 'flex';
            
            if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
            
            updateUI();
            speak(mode === 'PREP' ? "Get ready" : "Hold");
            timer = setInterval(tick, 1000);
        }

        function tick() {
            if (isPaused) return;
            timeLeft--;
            if (timeLeft < 0) transition();
            updateUI();
        }

        function transition() {
            const holdT = parseInt(document.getElementById('inHold').value);
            const restT = parseInt(document.getElementById('inRest').value);
            const setRestT = parseInt(document.getElementById('inSetRest').value);
            const reps = parseInt(document.getElementById('inReps').value);
            const sets = parseInt(document.getElementById('inSets').value);

            if (mode === 'PREP' || mode === 'REST' || mode === 'SETREST') {
                mode = 'HOLD'; timeLeft = holdT; speak("Hold");
            } else {
                if (currentRep < reps) {
                    currentRep++; mode = 'REST'; timeLeft = restT; speak("Rest");
                } else if (currentSet < sets) {
                    currentSet++; currentRep = 1; mode = 'SETREST'; timeLeft = setRestT; speak("Set rest");
                } else {
                    finish();
                }
            }
        }

        function finish() {
            clearInterval(timer);
            speak("Workout complete");
            alert("Great job!");
            resetAll();
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('btn-pause').innerText = isPaused ? "RESUME" : "PAUSE";
            document.getElementById('btn-pause').style.background = isPaused ? "#2ecc71" : "rgba(255,255,255,0.2)";
        }

        function resetAll() {
            clearInterval(timer); timer = null; isPaused = false;
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            document.getElementById('screen-settings').style.display = 'flex';
            document.getElementById('screen-workout').style.display = 'none';
            document.getElementById('btn-pause').innerText = "PAUSE";
            document.getElementById('btn-pause').style.background = "rgba(255,255,255,0.2)";
        }

        function updateUI() {
            const screen = document.getElementById('screen-workout');
            const statusText = document.getElementById('status-text');
            
            screen.className = "mode-" + mode.toLowerCase();
            statusText.innerText = (mode === 'SETREST' ? 'SET REST' : mode);
            document.getElementById('timer-display').innerText = timeLeft;
            document.getElementById('outSet').innerText = currentSet;
            document.getElementById('outRep').innerText = currentRep;
        }
    </script>
</body>
</html>
